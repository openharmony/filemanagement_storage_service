{
    "jobs": [{
        "name": "post-fs",
        "cmds": [
            "mkdir /data/service/el1/public/storage_space_manager 0755 1092 1092"
        ]
    }],
    "services": [{
        "name": "StorageSpaceMgr",
        "path": ["/system/bin/sa_main", "/system/profile/StorageSpaceMgr.json"],
        "uid": "storage_space_manager",
        "gid": ["storage_space_manager"],
        "ondemand": true,
        "sandbox": 0,
        "secon": "u:r:storage_space_manager:s0",
        "apl": "system_basic",
        "permission": [
            "ohos.permission.PUBLISH_SYSTEM_COMMON_EVENT",
            "ohos.permission.MOUNT_UNMOUNT_MANAGER",
            "ohos.permission.MOUNT_FORMAT_MANAGER",
            "ohos.permission.ENCRYPT_VOLUME_MANAGER",
            "ohos.permission.GET_BUNDLE_INFO_PRIVILEGED",
            "ohos.permission.GET_INSTALLED_BUNDLE_LIST",
            "ohos.permission.INTERACT_ACROSS_LOCAL_ACCOUNTS",
            "ohos.permission.MANAGE_LOCAL_WORKSPACES",
            "ohos.permission.BUNDLE_ACTIVE_INFO",
            "ohos.permission.REMOVE_CACHE_FILES"
        ],
        "permission_acls": []
    }]
}
